name: Deploy Backend (SFTP)

on:
  push:
    branches:
      - DEV_Branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tokenize appsettings
        env:
          AZUREOPENAI__ENDPOINT: ${{ secrets.AZUREOPENAI__ENDPOINT }}
          AZUREOPENAI__APIKEY: ${{ secrets.AZUREOPENAI__APIKEY }}
          AZUREOPENAI__DEPLOYMENTNAME: ${{ secrets.AZUREOPENAI__DEPLOYMENTNAME }}
          AZUREOPENAI__APIVERSION: ${{ secrets.AZUREOPENAI__APIVERSION }}
          AZURESEARCH__ENDPOINT: ${{ secrets.AZURESEARCH__ENDPOINT }}
          AZURESEARCH__APIKEY: ${{ secrets.AZURESEARCH__APIKEY }}
          AZURESEARCH__INDEXNAME: ${{ secrets.AZURESEARCH__INDEXNAME }}
          APPLICATIONINSIGHTS__CONNECTIONSTRING: ${{ secrets.APPLICATIONINSIGHTS__CONNECTIONSTRING }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const templatePath = 'appsettings.template.json';
          let content = fs.readFileSync(templatePath, 'utf8');
          const keys = [
            'AZUREOPENAI__ENDPOINT',
            'AZUREOPENAI__APIKEY',
            'AZUREOPENAI__DEPLOYMENTNAME',
            'AZUREOPENAI__APIVERSION',
            'AZURESEARCH__ENDPOINT',
            'AZURESEARCH__APIKEY',
            'AZURESEARCH__INDEXNAME',
            'APPLICATIONINSIGHTS__CONNECTIONSTRING',
          ];

          for (const key of keys) {
            const value = process.env[key];
            if (!value) {
              throw new Error(`Missing environment value for ${key}`);
            }
            const pattern = new RegExp(`\\{${key}\\}`, 'g');
            content = content.replace(pattern, value);
          }

          fs.writeFileSync('appsettings.json', content, 'utf8');
          NODE

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore ResumeChat.RagApi.csproj

      - name: Publish API
        run: dotnet publish ResumeChat.RagApi.csproj -c Release -o publish

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via SFTP (lftp)
        run: |
          lftp -u "${{ secrets.SFTP_USER }}","${{ secrets.SFTP_PASSWORD }}" sftp://${{ secrets.SFTP_HOST }}:2222 <<EOF
          set sftp:auto-confirm yes
          mirror -R --delete --verbose publish/ /ResumeAI/backend/
          bye
          EOF
